<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uber Clone</title>
    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">

        <div class="nav-left">

            <a href="#" class="logo">Uber</a>

            <a href="#">Ride</a>
            <a href="#">Earn</a>
            <a href="#">Business</a>
            <a href="#">Uber Eats</a>
            <a href="#">About <i class="fa-solid fa-angle-down"></i></a>

        </div>

        <div class="nav-right">

            <a href="#"><i class="fa-solid fa-globe"></i> EN</a>
            <a href="#">Help</a>
            <a href="#">Log in</a>

            <a href="#" class="signup-btn">
                Sign up
            </a>

        </div>

    </nav>

    <!-- HERO -->
    <section class="hero">

        <!-- LEFT -->
        <div class="hero-left">

            <p class="city">
                <i class="fa-solid fa-location-dot"></i>
                Dhaka, BD

                <a href="#">Change city</a>
            </p>

            <h1>
                Go anywhere with
                <br>
                Uber
            </h1>

            <div class="pickup-now">

                <i class="fa-solid fa-clock"></i>

                Pickup now

                <i class="fa-solid fa-angle-down"></i>

            </div>

            <div class="input-box">

                <i class="fa-solid fa-circle"></i>

                <input
                type="text"
                placeholder="Pickup location">

                <i class="fa-solid fa-location-arrow"></i>

            </div>

            <div class="line"></div>

            <div class="input-box">

                <i class="fa-solid fa-square"></i>

                <input
                type="text"
                placeholder="Dropoff location">

            </div>

            <div class="buttons">

                <button>
                    See prices
                </button>

                <a href="#">
                    Log in to see your recent activity
                </a>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="hero-right">

            <div class="image-wrapper">

                <img src="hero-section-image.webp" alt="">

                <div class="football">
                    ⚽
                </div>

                <div class="bottom-card">

                    <div>
                        Everything you need to cheer
                        <br>
                        with your city
                    </div>

                    <a href="#">
                        Get in the game
                    </a>

                </div>

            </div>

        </div>

    </section>

</body>
</html>
